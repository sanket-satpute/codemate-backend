version: '3.8'
services:
  backend:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - redis
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - JWT_SECRET=your-super-secret-key-for-production
      - HF_API_KEY=your_hugging_face_api_key
      - OPENAI_API_KEY=your_openai_api_key

  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"
