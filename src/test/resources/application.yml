spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  main:
    web-application-type: reactive
  data:
    mongodb:
      uri: mongodb://localhost:27017/codescope_test
    redis:
      host: localhost
      port: 6379
  ai:
    openai:
      api-key: test-openai-key

api:
  github:
    key: test-github-key
  gemini:
    key: test-gemini-key
  groq:
    key: test-groq-key

app:
  repositories:
    enabled: false

frontend:
  origin: http://localhost:4200

ai:
  huggingface:
    api:
      url: https://api-inference.huggingface.co/models
      key: test-hf-key
  openai:
    api:
      url: https://api.openai.com/v1/chat/completions
      key: test-openai-key
    token: test-openai-key

file:
  upload-dir: uploads-test

jwt:
  secret: test-jwt-secret-key-for-tests-only-1234567890
