spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: backend
  main:
    web-application-type: reactive
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
  codec:
    max-in-memory-size: 10MB # Increase buffer for large file uploads

api:
  github:
    key: ${GITHUB_AI_TOKEN}
  gemini:
    key: ${GEMINI_AI_TOKEN}
  groq:
    key: ${GROQ_AI_TOKEN}

# Spring AI Configuration

server:
  port: ${PORT:8080}

# Cloudinary Configuration
cloudinary:
  url: ${CLOUDINARY_URL}

# AI Service Configuration (legacy providers)
ai:
  defaultModel: openai
  huggingface:
    api:
      url: https://api-inference.huggingface.co/models
      key: ${HUGGINGFACE_API_KEY:}
    default-model: google/flan-t5-base
  openai:
    api:
      url: https://api.openai.com/v1/chat/completions
      key: ${OPENAI_API_KEY:}
    token: ${OPENAI_API_KEY:}
  provider:
    default: openai
  retry:
    max-attempts: 3
    delay-seconds: 5

# JWT Configuration
file:
  upload-dir: uploads

frontend:
  origin: ${FRONTEND_ORIGIN:http://localhost:4200}

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000

# Actuator / Health Checks
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        codescope.http.server.latency: true
      percentiles:
        codescope.http.server.latency: 0.5,0.95,0.99

logging:
  level:
    root: INFO
    com.codescope.backend: INFO
    org.springframework.ai: INFO

app:
  redis:
    enabled: false
  repositories:
    enabled: true

project:
  id:
    backfill:
      enabled: true
