spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: backend
  main:
    web-application-type: reactive
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
  codec:
    max-in-memory-size: 10MB # Increase buffer for large file uploads
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/codescope}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource: # JPA Data Source (for ProjectRepository)
    url: jdbc:h2:mem:codescope;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

api:
  github:
    key: ${GITHUB_AI_TOKEN:your_github_ai_token}
  gemini:
    key: ${GEMINI_AI_TOKEN:your_gemini_ai_token}
  groq:
    key: ${GROQ_AI_TOKEN:your_groq_ai_token}

# Spring AI Configuration

server:
  port: 8080

# Cloudinary Configuration
cloudinary:
  url: ${CLOUDINARY_URL:cloudinary://key:secret@cloud}

# AI Service Configuration (legacy providers)
ai:
  defaultModel: openai
  huggingface:
    api:
      url: https://api-inference.huggingface.co/models
      key: ${HUGGINGFACE_API_KEY:your_hugging_face_api_key}
    default-model: google/flan-t5-base
  openai:
    api:
      url: https://api.openai.com/v1/chat/completions
      key: ${OPENAI_API_KEY:your_openai_api_key}
    token: ${OPENAI_API_KEY:your_openai_api_key}
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    default-model: llama2
  provider:
    default: openai
  retry:
    max-attempts: 3
    delay-seconds: 5

# JWT Configuration
file:
  upload-dir: uploads

jwt:
  secret: ${JWT_SECRET:Y29kZXNjb3BlLWRldi1zZWNyZXQta2V5LXRoYXQtaXMtbG9uZy1lbm91Z2gtZm9yLWhzMjU2}
  expiration: 3600000

# Actuator / Health Checks
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        codescope.http.server.latency: true
      percentiles:
        codescope.http.server.latency: 0.5,0.95,0.99

logging:
  level:
    root: INFO
    com.codescope.backend: DEBUG
    org.springframework.ai: DEBUG

app:
  repositories:
    enabled: true

project:
  id:
    backfill:
      enabled: true