spring:
  data:
    mongodb:
      uri: ${MONGODB_URI}

server:
  port: ${PORT:8080}

file:
  upload-dir: /tmp/uploads

frontend:
  origins: ${FRONTEND_ORIGINS:${FRONTEND_ORIGIN:https://codemate-five.vercel.app,https://codemate-git-main-ssatpute738-2203s-projects.vercel.app,https://codemate-78zgnunry-ssatpute738-2203s-projects.vercel.app}}
  origin-patterns: ${FRONTEND_ORIGIN_PATTERNS:https://codemate-*.vercel.app}

app:
  redis:
    enabled: ${APP_REDIS_ENABLED:false}

project:
  id:
    backfill:
      enabled: ${PROJECT_ID_BACKFILL_ENABLED:false}

logging:
  level:
    root: INFO
    com.codescope.backend: INFO
