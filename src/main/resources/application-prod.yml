spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  data:
    mongodb:
      uri: ${MONGODB_URI}
    redis:
      url: ${REDIS_URL}

server:
  port: ${PORT:8080}

file:
  upload-dir: /tmp/uploads

frontend:
  origins: ${FRONTEND_ORIGINS:${FRONTEND_ORIGIN:https://codemate-five.vercel.app,https://codemate-git-main-ssatpute738-2203s-projects.vercel.app,https://codemate-78zgnunry-ssatpute738-2203s-projects.vercel.app}}

logging:
  level:
    root: INFO
    com.codescope.backend: INFO
